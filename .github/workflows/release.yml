name: Release from Tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract changelog section for tag
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES="$(awk -v tag="$TAG" '
            $0 ~ "^## \\[" tag "\\]" {flag=1}
            /^## \[/ && flag && seen {exit}
            flag {print; seen=1}
          ' CHANGELOG.md)"

          if [ -z "${NOTES}" ]; then
            echo "No changelog section found for ${TAG} in CHANGELOG.md" >&2
            exit 1
          fi

          {
            echo "release_notes<<EOF"
            echo "${NOTES}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.release_notes }}
